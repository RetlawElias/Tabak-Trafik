            class BackgroundLayer 
            {
                constructor(image, speed, offset = 0, isCloudPattern = false) 
                {
                    this.image = image;
                    this.speed = speed;
                    this.x = offset;
                    this.y = 0;
                    this.isCloudPattern = isCloudPattern;
                }

                update(direction, dt, preGameOffset) 
                {
                    this.x += direction * this.speed * dt;
                    this.y = Math.round(preGameOffset * this.speed * 4 / 4) * 4;
                }

                draw(ctx, canvas) 
                {
                    if(this.isCloudPattern)
                    {
                        ctx.drawImage(this.image,Math.round(this.x * 2),this.y,this.image.width,this.image.height);
                    }
                    else
                    {
                        ctx.drawImage(this.image,Math.round(this.x * 2),this.y,canvas.width * 1.08,canvas.height);
                    }
                }
            }
                

            const UIManager = 
            {
                elements: [],
                
                add(element) 
                {
                    this.elements.push(element);
                },

                handleClick(mouseX, mouseY) 
                {
                    console.log("Click at: " + mouseX + ", " + mouseY);
                    
                    // Iterate in reverse draw order (topmost first)
                    for (let i = this.elements.length - 1; i >= 0; i--) 
                    {
                        const element = this.elements[i];

                        
                        if (element.hitTest(mouseX, mouseY)) 
                        {
                            console.log("true");

                            if (element.blocksInput) 
                            {
                                element.onClick();
                                return;
                            }
                        }
                    }
                },

                draw(absolute) 
                {
                    if(absolute)
                    {
                        this.elements.forEach(element => 
                        {
                            if(element.isAbsolute)
                            {
                                element.drawSelf();
                            }
                        });
                    }
                    else
                    {
                        this.elements.forEach(element => 
                        {
                            if(!element.isAbsolute)
                            {
                                element.drawSelf();
                            }
                        });    
                    }
                }
            };

            function addListenersToCanvas(canvas)
            {

                canvas.addEventListener("pointerdown", e => 
                {
                    isDragging = true;
                    lastX = e.clientX;
                    clientClick = true;

                    if(techtreePannel.active && !techtreePannel.containsPoint(e.clientX, e.clientY)) { // close techtree panel if click is outside it
                        techtreePannel.setActive(false);
                    }
                });
                
                canvas.addEventListener("pointermove", e => 
                {
                    if (!isDragging) return;
                    
                    const dx = e.clientX - lastX;
                    draggingTolerance = lastX;
                    lastX = e.clientX;
                    velocityX = dx;
                    camera.x -= dx;
                });
                
                
                canvas.addEventListener("pointerup", e => 
                {
                    clientClick = true;
                    isDragging = false;

                    if(techtreePannel.active && !techtreePannel.hitTest()) // close techtree panel no matter where the click is
                    {
                        //techtreePannel.setActive(false);
                    }
                });


                canvas.addEventListener("click", function(e)
                {
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    
                    UIManager.handleClick(mouseX, mouseY);
                });
            }

            function addListenersToWindow()

                    document.getElementById("canvas").width = window.innerWidth - 0;
                    document.getElementById("canvas").height = window.innerHeight - 4;

                });

            var myGameArea =

                canvas : document.getElementById("canvas"),
                start : function() {
                    this.canvas.width = window.innerWidth - 0;
                    this.canvas.height = window.innerHeight - 4;
                    this.context = this.canvas.getContext("2d");
                    ctx = this.context;
                    document.body.insertBefore(this.canvas, document.body.childNodes[0]);
                    this.frameNo = 0;
                    this.interval = setInterval(updateGameArea, 20);

                    addListenersToCanvas(this.canvas);
                    addListenersToWindow();

                },
                updateSize : function()
                {
                    
                },
                pause : function()
                {
                    clearInterval(this.interval);
                },
                unpause : function() 
                {
                    this.interval = setInterval(updateGameArea, 20);
                },
                stop : function()

                    clearInterval(this.interval);
                },    
                clear : function() 
                {
                    this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }

            function drawObject(obj) 
            {
                ctx.drawImage(obj.image, obj.x - camera.x, obj.y - camera.y);
            }



            function update() 
            {
                if (!isDragging) 
                {
                    velocityX *= 0.92;
                    camera.x -= velocityX;
                }

                // Clamp
                camera.x = Math.max(0, Math.min(WORLD_WIDTH - VIEW_WIDTH, camera.x));
            }   
            



        function drawBackground(ctx)
        {
            //ctx.filter = "saturate(50%)";

            for(let j = 0; j < (WORLD_WIDTH + myGameArea.canvas.width) / backgroundDetail; j++)
            {
                for(let i = 0; i < myGameArea.canvas.height / backgroundDetail; i++)
                {
                    if(i + 3 < myGameArea.canvas.height / backgroundDetail)
                    {
                        /*if(j == 2)
                        {
                            ctx.drawImage(bricksAngledBordered, backgroundDetail * j + j * -1, i * backgroundDetail + i * -1, backgroundDetail, backgroundDetail);
                        }
                        else if(j <= 2)
                        {
                            ctx.drawImage(bricksAngled, backgroundDetail * j + j * -1, i * backgroundDetail + i * -1, backgroundDetail, backgroundDetail);
                        }
                        else
                        {*/
                            ctx.drawImage(bricks, backgroundDetail * j + j * -1, i * backgroundDetail + i * -1, backgroundDetail, backgroundDetail);
                        //}
                    }
                    else if(i + 2 < myGameArea.canvas.height / backgroundDetail)
                    {
                        ctx.drawImage(bricksGroundBordered, backgroundDetail * j + j * -1, i * backgroundDetail + i * -1, backgroundDetail, backgroundDetail);
                    }
                    else
                    {
                        ctx.drawImage(bricksGround, backgroundDetail * j + j * -1, i * backgroundDetail + i * -1, backgroundDetail, backgroundDetail);
                    }
                }
            }
        }

        function realignGUI()
        {
            startButton.x = myGameArea.canvas.width / 2 - (myGameArea.canvas.width / 4 / 2);
            startButton.sizeX = myGameArea.canvas.width / 4;
            startButton.sizeY = myGameArea.canvas.height / 4;
        }



        function drawStartButton()
        {


            //Start-Button
            const FadeTiming = 100;
            const MoveTiming = 40;
            

            if(startScreenAnimationIterator % (MoveTiming * 2) < MoveTiming)
                {
                    if(startScreenAnimationIterator % (MoveTiming / 4) == 0)
                    {
                        startButton.y -= 1;
                    }
                }
                else
                {
                    if(startScreenAnimationIterator % (MoveTiming / 4) == 0)
                    {
                        startButton.y += 1;
                    }
                }

            if(!startButton.onClickCheck())
            {

                if(startScreenFadingIterator % (FadeTiming * 2) < FadeTiming)
                {
                    startButton.setAlpha((startScreenFadingIterator % FadeTiming) / FadeTiming + 0.3)
                }
                else
                {
                    startButton.setAlpha(1 - (startScreenFadingIterator % FadeTiming) / FadeTiming + 0.3);
                }
            }
            else
            {
                startButton.setAlpha(1);
                startScreenFadingIterator = FadeTiming;
            }
        }
        


        function updateGameArea()
        {
            const now = performance.now();
            const dt = (now - lastTime) / 1000; // seconds
            
            frame++;

            if(techtreePannel.active && techtreePannel.containsPoint(cursorX, cursorY))
            {
                uiBlockingInput = false; // if mouse is over the panel, then block input to the world (buttons will still work)
            } 
            else
            {
                uiBlockingInput = true;
            }
  
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if(!gameStarted)
            {
                lastTime = now;
                baseOffset += direction * dt;
                
                
                if (Math.abs(baseOffset) > range) 
                {
                    direction *= -1;
                }
                
                
                
                if(preGameLoadupIterator > 0 && preGameLoadupIterator < 150)
                {
                    preGameLoadupIterator--;
                    layers.forEach(layer => layer.update(direction, dt, preGameLoadupIterator));
                    layers.forEach(layer => layer.draw(ctx, myGameArea.canvas));
                }
                else if(preGameLoadupIterator < 150)
                {
                    startScreenFadingIterator++;
                    layers.forEach(layer => layer.update(direction, dt, preGameLoadupIterator));
                    layers.forEach(layer => layer.draw(ctx, myGameArea.canvas));
                    drawStartButton();
                    UIManager.draw(true);
                }
                else
                {
                    layers.forEach(layer => layer.update(direction, dt, 150));
                    layers.forEach(layer => layer.draw(ctx, myGameArea.canvas));
                    preGameLoadupIterator--;
                }
                


                startScreenAnimationIterator++;
                clientClick = false;
                return;
            }
            





            update();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
                
            ctx.save();
            ctx.translate(-camera.x, -camera.y);




            cigarettes += cigarettesGain;


            // Relative to Camera //
                
            drawBackground(ctx);
            drawButtonsAndLabels();
            
            
            // Camera Elements Only
            UIManager.draw(false);


            ctx.restore();
            // Relative to Screen //

            if(!techtreePannel.active) { 
                techtreeButton.drawSelf();
            }
            

            techtreePannel.drawSelf();


            ctx.textAlign = "left";
            ctx.textBaseline = "middle"; // center aint a valid value here...lovely javascript
            ctx.font = "20px Arial";
            ctx.fillText("Frame: " + frame, 20, 20);
            ctx.fillText(mousePosition, 20, 50);



            ctx.fillStyle = "rgba(255,255,255,0.33)";
            ctx.fillRect(canvas.width + CIGARETTESPANELOFFSET + 75, 0, 175, 200);

            ctx.drawImage(cigarettesTexture, canvas.width + CIGARETTESPANELOFFSET + 200, 5, 50, 50);
            ctx.drawImage(upgradeCigarettesTexture, canvas.width + CIGARETTESPANELOFFSET + 200, 65, 50, 50);
            ctx.drawImage(premiumCigarettesTexture, canvas.width + CIGARETTESPANELOFFSET + 200, 125, 50, 50);
            ctx.fillStyle = "rgba(0,0,0,1)";
            ctx.font = "28px Titanic";


            switch (true) 
            {
                case cigarettes > 1000000000:
                    ctx.fillText((cigarettes / 1000000000).toFixed(2) + "Trl", canvas.width + CIGARETTESPANELOFFSET + 80, 42);
                    break;
                case cigarettes > 1000000000:
                    ctx.fillText((cigarettes / 1000000).toFixed(2) + "Bil", canvas.width + CIGARETTESPANELOFFSET + 80, 42);
                    break;
                case cigarettes > 1000000:
                    ctx.fillText((cigarettes / 1000000).toFixed(2) + "Mil", canvas.width + CIGARETTESPANELOFFSET + 80, 42);
                    break;
                case cigarettes > 1000:
                    ctx.fillText((cigarettes / 1000).toFixed(2) + "Tsd", canvas.width + CIGARETTESPANELOFFSET + 80, 42);
                    break;
                default:
                    ctx.fillText(Math.floor(cigarettes), canvas.width + CIGARETTESPANELOFFSET + 80, 42);
                    break;
            }
           
            ctx.fillText(upgradeCigarettes, canvas.width + CIGARETTESPANELOFFSET + 80, 102);
            ctx.fillText(premiumCigarettes, canvas.width + CIGARETTESPANELOFFSET + 80, 162);



            for(let i = 0; i < upgradeButtons.length; i++)
            {
                if(cigarettes >  Math.ceil(machineBaseCosts[i] * machineCostMultipliers[i]) || upgradeButtons[i].buttonTexture.text == "Free")
                {
                    upgradeButtons[i].setAlpha(0.95);
                }
                else
                {
                    upgradeButtons[i].setAlpha(0.6);
                }

                let BatchCost = 0;

                for(let j = 0; j < 5; j++)
                {
                    BatchCost += Math.ceil(machineBaseCosts[i] * (machineCostMultipliers[i] * Math.pow(1.1, j)));
                }

                if(cigarettes > BatchCost)
                {
                    batchUpgradeButtons[i].buttonTexture.color = "green";
                }
                else
                {
                    batchUpgradeButtons[i].buttonTexture.color = "grey";
                }

                for(let j = 5; j < 10; j++)
                {
                    BatchCost += Math.ceil(machineBaseCosts[i] * (machineCostMultipliers[i] * Math.pow(1.1, j)));
                }

                if(cigarettes > BatchCost)
                {
                    stackUpgradeButtons[i].buttonTexture.color = "green";
                }
                else
                {
                    stackUpgradeButtons[i].buttonTexture.color = "grey";
                }

            }
            


            // Relative to Screen //


            clientClick = false;
        }





        function drawButtonsAndLabels()
        {
            for(let i = 0; i < upgradeButtons.length; i++)
            {
                const val = Math.ceil(machineBaseCosts[i] * machineCostMultipliers[i]);

                switch(true)
                {
                    case val >= 1000000:
                        upgradeButtons[i].buttonTexture.text = (val / 1000000).toFixed(2).toString() + "Mil";
                        break;
                    case val >= 1000:
                        upgradeButtons[i].buttonTexture.text = (val / 1000).toFixed(2).toString() + "Tsd";
                        break;
                    default:
                        upgradeButtons[i].buttonTexture.text = (val).toString()
                        break;

                if(upgradeButtons[i].buttonTexture.text == 0)
                {
                    upgradeButtons[i].buttonTexture.text = "Free";

            function updateCursorPosition(event) 
            {
                cursorX = event.clientX;
                cursorY = event.clientY;
                var positionElement = document.getElementById("mousePosition");

                // Update the body's content to display the cursor position
                mousePosition = "X: " + Math.round(cursorX - 8 + camera.x) + ", Y: " + Math.round(cursorY - 8 + camera.y);

        function canvasPannelTexture(texture, color = "")
        {
            this.texture = texture;
            this.color = color;
        }

        function canvasPannel(x,y, sizeX, sizeY, pannelTexture, isAbsolute)
        {
            this.x = x;
            this.y = y;
            this.sizeX = sizeX;
            this.sizeY = sizeY;
            this.blocksInput = true;
            this.pannelTexture = pannelTexture;
            this.active = true;
            this.isAbsolute = isAbsolute;
            this.components = [];

            this.addChild = function(child)
            {
                this.components.push(child);
            }

            this.setActive = function(setActive)
            {
                if(setActive)
                {
                    this.active = true;
                    this.components.forEach(element => {
                        element.setActive(true);
                    });
                }
                else
                {
                    this.active = false;
                    this.components.forEach(element => {
                        element.setActive(false);
                    });
                }
            }

            this.hitTest = function(mouseX, mouseY)
            {
                if(this.isAbsolute)
                {
                    const result =
                    mouseX >= this.x &&
                    mouseX <= this.x + this.sizeX &&
                    mouseY >= this.y &&
                    mouseY <= this.y + this.sizeY;

                    return result;
                }
                else
                {
                    const result =
                    mouseX + camera.x >= this.x &&
                    mouseX + camera.x <= this.x + this.sizeX &&
                    mouseY >= this.y &&
                    mouseY <= this.y + this.sizeY;

                    return result;
                }
            }
            
            this.onClick = function() 
            {
                // empty — but important to block click-through
            }


            this.drawSelf = function()
            {
                if(this.active)
                {
                    if(this.pannelTexture.texture !== "")
                    {
                        ctx.drawImage(this.pannelTexture.texture, this.x, this.y, this.sizeX, this.sizeY)
                    }
                    else
                    {
                        ctx.fillStyle = this.pannelTexture.color;
                        ctx.fillRect(this.x, this.y, this.sizeX, this.sizeY);
                    }
                    
                    this.components.forEach(element => {
                        element.drawSelf();
                    });
                }
            }

            this.containsPoint = function(x, y) {
                return (
                    this.active &&
                    x >= this.x &&
                    x <= this.x + this.sizeX &&
                    y >= this.y &&
                    y <= this.y + this.sizeY
                );
            };
        }


        
        function canvasButtonTexture(texture, color = "", text = "")
        {
            this.texture = texture;
            this.color = color;
            this.text = text;
        }


        function canvasButton(x,y, sizeX, sizeY, buttonTexture, isAbsolute, enabled = true)
        {
            this.x = x;
            this.y = y;
            this.sizeX = sizeX;
            this.sizeY = sizeY;
            this.buttonTexture = buttonTexture;
            this.enabled = enabled;
            this.blocksInput = true;
            this.isAbsolute = isAbsolute;
            this.active = true;
            this.alpha = 1;
            
            this.setActive = function(setActive)
            {
                if(setActive)
                {
                    this.active = true;
                }
                else
                {
                    this.active = false;
                }
            }

            
            this.setAlpha = function(alpha)
            {
                this.alpha = alpha;
            }


            this.drawSelf = function()
            {
                if(this.active)
                {
                if(this.buttonTexture.texture !== "")
                {
                    ctx.globalAlpha = this.alpha;
                    ctx.drawImage(this.buttonTexture.texture, this.x, this.y, this.sizeX, this.sizeY);
                    ctx.globalAlpha = 1;
                }
                else
                {
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.buttonTexture.color;
                    ctx.fillRect(this.x, this.y, this.sizeX, this.sizeY);
                    ctx.globalAlpha = 1;
                }

                if (this.buttonTexture.text !== "")
                {
                    ctx.globalAlpha = this.alpha;
                    // Draw text (fitted)
                    const text = this.buttonTexture.text;
                    const paddingX = this.sizeX * 0.1; // 10% horizontal padding
                    const paddingY = this.sizeY * 0.2; // vertical breathing room
                    

                    if (!text) return;
                    
                    const maxTextWidth = this.sizeX - paddingX * 2;
                    let fontSize = Math.floor(this.sizeY * 0.45); // start large
                    
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "black";
                    
                    // Shrink-to-fit loop
                    do
                    {
                        ctx.font = `${fontSize}px Arial`;
                        fontSize--;
                    }
                    while (ctx.measureText(text).width > maxTextWidth && fontSize > 8);
                    
                    // Centered draw
                    ctx.fillText(
                        text,
                        this.x + this.sizeX / 2,
                        this.y + this.sizeY / 2
                    );
                    ctx.globalAlpha = 1;
                }
                }
            }

            this.hitTest = function(mouseX, mouseY)
            {
                if(this.isAbsolute)
                {
                    const result =
                    mouseX >= this.x &&
                    mouseX <= this.x + this.sizeX &&
                    mouseY >= this.y &&
                    mouseY <= this.y + this.sizeY;

                    return result;
                }
                else
                {
                    const result =
                    mouseX + camera.x >= this.x &&
                    mouseX + camera.x <= this.x + this.sizeX &&
                    mouseY >= this.y &&
                    mouseY <= this.y + this.sizeY;

                    return result;
                }
            }
            
            this.onClickCheck = function()
            {
                if(this.active)
                {
                    if(cursorX + camera.x >= this.x && cursorX + camera.x <= this.x + this.sizeX &&
                    cursorY >= this.y && cursorY <= this.y + this.sizeY)
                    {
                        this.onHover();
                        return true;
                    }

                return false;
                }
            }

            this.onHover = function()
            {
                console.log("Hovered the Button");
                if(clientClick)
                {
                    this.onClick();
                }   
            }

            this.onClick = function()
            {
                console.log("Button has been clicked");
                this.color = "rgba("+ Math.floor((Math.random() * 255)) + "," + 
                                      Math.floor((Math.random() * 255)) + "," +
                                      Math.floor((Math.random() * 255)) + "," +
                                      Math.floor((Math.random() * 255)) +")";
                console.log("New Color: " + this.color);
            }
        }
